<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TL_GS - 玩法策略推荐</title>
<style>
:root {
  --bg: #0b0e17;
  --surface: #13172a;
  --surface2: #1a2035;
  --border: #252a40;
  --fire: #f59e0b;
  --gold: #fbbf24;
  --rmb: #34d399;
  --danger: #f87171;
  --text: #e2e8f0;
  --muted: #64748b;
  --blue: #60a5fa;
  --green: #34d399;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 15px;
  min-height: 100vh;
  padding: 20px;
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  width: 100vw;
  margin: -20px -20px 20px;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  box-sizing: border-box;
}
.header-title {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-title h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--fire);
  letter-spacing: 1px;
}
.header-title span {
  font-size: 13px;
  color: var(--muted);
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.fire-price-display {
  font-size: 12px;
  color: var(--fire);
  margin-left: 12px;
  font-weight: normal;
}
.fire-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(245,158,11,0.1);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 14px;
  color: var(--fire);
  font-weight: 700;
}
.fire-badge .fl { color: var(--muted); font-size: 12px; font-weight: 400; }
.add-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: #0b0e17;
  border: none;
  border-radius: 10px;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
  font-family: inherit;
}
.add-btn:hover { opacity: 0.88; }

/* ===== UPLOAD MODAL ===== */
#uploadModal .modal-body { gap: 14px; }
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  background: var(--surface2);
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--fire);
  background: rgba(245,158,11,0.06);
}
.upload-zone input[type="file"] { display: none; }
.upload-zone .icon { font-size: 36px; margin-bottom: 10px; }
.upload-zone .text { color: var(--muted); font-size: 13px; }
.upload-zone .text span { color: var(--fire); }
.preview-img {
  max-width: 100%;
  max-height: 300px;
  border-radius: 8px;
  border: 1px solid var(--border);
  display: block;
  margin: 0 auto;
}
.preview-section { display: none; }
.preview-section.show { display: block; }
.preview-section h4 {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.preview-table { width: 100%; border-collapse: collapse; }
.preview-table td {
  padding: 5px 8px;
  font-size: 13px;
  border-bottom: 1px solid rgba(37,42,64,0.5);
}
.preview-table td:first-child { color: var(--muted); width: 90px; }
.pv-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  padding: 4px 8px;
  font-family: inherit;
  box-sizing: border-box;
}
.pv-input:focus { outline: none; border-color: var(--fire); }
.pv-input option { background: var(--surface2); }
.upload-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.btn {
  padding: 8px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: all 0.2s;
  font-family: inherit;
}
.btn-ghost { background: var(--surface2); color: var(--muted); }
.btn-ghost:hover { color: var(--text); border-color: var(--muted); }
.btn-primary { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0b0e17; border: none; }
.btn-primary:hover { opacity: 0.88; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(248,113,113,0.4); }
.btn-danger:hover { background: rgba(248,113,113,0.1); }

/* ===== MODAL FOOTER ===== */
.modal-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 22px;
  border-top: 1px solid var(--border);
}
.upload-status { font-size: 13px; padding: 8px 12px; border-radius: 6px; margin-top: 8px; display: none; }
.upload-status.show { display: block; }
.upload-status.success { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
.upload-status.error { background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
.upload-status.loading { background: rgba(245,158,11,0.1); color: var(--fire); border: 1px solid rgba(245,158,11,0.3); }

/* ===== RECOMMENDATIONS ===== */
.recommend-section {
  max-width: 1400px;
  margin: 0 auto 16px;
}
.recommend-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.recommend-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.3px;
}
.recommend-meta {
  font-size: 11px;
  color: var(--muted);
}
.recommend-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.recommend-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.recommend-card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--fire), #d97706);
  border-radius: 14px 14px 0 0;
}
.recommend-card:hover {
  border-color: var(--fire);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(245,158,11,0.15);
}
.recommend-card .rc-rank {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 28px;
  font-weight: 900;
  color: rgba(245,158,11,0.12);
  line-height: 1;
}
.recommend-card .rc-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  padding-right: 30px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.recommend-card .rc-map {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 10px;
}
.recommend-card .rc-stats {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.recommend-card .rc-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.recommend-card .rc-stat .l {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.recommend-card .rc-stat .v {
  font-size: 16px;
  font-weight: 700;
}
.recommend-card .rc-stat .v.roi { color: var(--green); }
.recommend-card .rc-stat .v.profit { color: var(--fire); }
.recommend-card .rc-stat .v.neg { color: var(--danger); }
.recommend-card .rc-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
}
.recommend-card .rc-duration {
  font-size: 11px;
  color: var(--muted);
}
.recommend-loading {
  grid-column: 1 / -1;
  text-align: center;
  padding: 30px;
  color: var(--muted);
  font-size: 13px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
}

/* ===== FILTER BAR ===== */
.filter-bar {
  max-width: 1400px;
  margin: 0 auto 16px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
}
.search-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  min-width: 200px;
  font-family: inherit;
}
.search-input:focus { border-color: var(--fire); }
.filter-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  cursor: pointer;
  font-family: inherit;
}
.filter-select:focus { border-color: var(--fire); }

/* ===== TABLE ===== */
.table-wrap {
  max-width: 1400px;
  margin: 0 auto 20px;
  overflow-x: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table thead {
  background: var(--surface2);
}
.data-table th {
  text-align: left;
  padding: 12px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: color 0.2s;
}
.data-table th:hover { color: var(--fire); }
.data-table th.sorted { color: var(--fire); }
.data-table th .sort-icon {
  margin-left: 4px;
  font-size: 10px;
  opacity: 0.5;
}
.data-table th.sorted .sort-icon { opacity: 1; }
.data-table td {
  padding: 10px 16px;
  font-size: 13px;
  border-bottom: 1px solid rgba(37,42,64,0.6);
  vertical-align: middle;
}
.data-table tbody tr {
  transition: background 0.15s;
  cursor: pointer;
}
.data-table tbody tr:hover { background: rgba(245,158,11,0.08); }
.data-table tbody tr:last-child td { border-bottom: none; }

/* ===== COLUMN: 玩法名称 ===== */
.td-name {
  font-weight: 600;
  color: var(--text);
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.td-map {
  color: var(--muted);
  font-size: 12px;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== COLUMN: 成本 ===== */
.td-fire { color: var(--fire); font-weight: 600; white-space: nowrap; }
.td-rmb { color: var(--rmb); font-size: 12px; white-space: nowrap; }

/* ===== COLUMN: 核心掉落 ===== */
.td-drops { font-size: 12px; max-width: 200px; }
.drop-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin: 1px 3px 1px 0;
  background: var(--surface2);
  border-radius: 4px;
  padding: 1px 6px;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.drop-item .dn { overflow: hidden; text-overflow: ellipsis; }

/* ===== COLUMN: 时长/难度/标签 ===== */
.td-duration { color: var(--blue); font-size: 12px; white-space: nowrap; }
.td-difficulty { }
.diff-badge {
  display: inline-block;
  font-size: 11px;
  border-radius: 4px;
  padding: 2px 7px;
  font-weight: 600;
}
.diff-badge.K7 { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.25); }
.diff-badge.K7-1 { background: rgba(52,211,153,0.18); color: #4ade80; border: 1px solid rgba(52,211,153,0.35); }
.diff-badge.K7-2 { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
.diff-badge.K8-0 { background: rgba(134,239,172,0.12); color: #86efac; border: 1px solid rgba(134,239,172,0.25); }
.diff-badge.K8-1 { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
.diff-badge.K8-2 { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.diff-badge.幽邃 { background: rgba(167,139,250,0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }
.diff-badge.深空 { background: rgba(96,165,250,0.12); color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }
.diff-badge.红深空 { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
.diff-badge.九红深空 { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.td-tags { }
.tag {
  display: inline-block;
  font-size: 10px;
  background: rgba(245,158,11,0.1);
  color: #fbbf24;
  border: 1px solid rgba(245,158,11,0.2);
  border-radius: 3px;
  padding: 1px 5px;
  margin: 1px 2px 1px 0;
}

/* ===== RARITY ===== */
.rarity-传说 { color: #fbbf24; }
.rarity-史诗 { color: #a78bfa; }
.rarity-精良 { color: #60a5fa; }
.rarity-普通 { color: var(--muted); }

/* ===== PROFIT COLUMN ===== */
.td-profit { font-weight: 700; white-space: nowrap; }
.td-profit.positive { color: var(--green); }
.td-profit.negative { color: var(--danger); }
.td-profit.zero { color: var(--muted); }
.td-roi { font-size: 12px; color: var(--muted); white-space: nowrap; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  max-width: 660px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 18px; font-weight: 700; color: var(--fire); }
.modal-close {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 16px;
  width: 32px;
  height: 32px;
  cursor: pointer;
  transition: all 0.2s;
}
.modal-close:hover { border-color: var(--fire); color: var(--fire); }
.modal-body { padding: 22px; display: flex; flex-direction: column; gap: 16px; }
.modal-meta {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.modal-meta-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  flex: 1;
  min-width: 100px;
}
.modal-meta-item .label { color: var(--muted); font-size: 11px; margin-bottom: 2px; }
.modal-meta-item .value { color: var(--text); font-weight: 600; font-size: 14px; }
.modal-section-title {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.modal-item-table { width: 100%; border-collapse: collapse; }
.modal-item-table th {
  text-align: left;
  font-size: 11px;
  color: var(--muted);
  padding: 5px 8px;
  border-bottom: 1px solid var(--border);
  font-weight: 400;
}
.modal-item-table td {
  padding: 6px 8px;
  font-size: 13px;
  border-bottom: 1px solid rgba(37,42,64,0.5);
}
.modal-item-table tr:last-child td { border-bottom: none; }
.modal-notes {
  background: var(--surface2);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
}

/* ===== EMPTY/LOADING ===== */
.empty-state, .loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  max-width: 1400px;
  margin: 0 auto;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

.settings-info{background:var(--surface2);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:13px;line-height:1.8}
.settings-info .si-row{display:flex;gap:8px}
.settings-info .si-label{color:var(--muted);min-width:70px}
.settings-info .si-value{color:var(--text);word-break:break-all}
.settings-info .si-value.ok{color:var(--green)}
.settings-info .si-value.err{color:var(--danger)}
.settings-form{display:flex;flex-direction:column;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase}
.form-group input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px 12px;font-family:inherit;width:100%}
.form-group input:focus{outline:none;border-color:var(--fire)}
.form-group .hint{font-size:11px;color:var(--muted)}
.settings-actions{display:flex;gap:10px;justify-content:flex-end}
.settings-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:8px 16px;font-size:14px;cursor:pointer;transition:all .2s;font-family:inherit}
.settings-btn:hover{border-color:var(--fire);color:var(--fire)}

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">
    <h1>🔥 TL_GS</h1>
    <span>火炬之光无限 · 玩法策略推荐</span>
  </div>
  <div class="header-actions">
    <button class="add-btn" onclick="openUploadModal()">➕ 添加策略截图</button>
    <button class="settings-btn" onclick="openSettingsModal()">⚙️ 设置</button>
  </div>
</div>

<!-- RECOMMENDATIONS -->
<div class="recommend-section" id="recommendSection">
  <div class="recommend-header">
    <div class="recommend-title">🏆 基于当前回报率 · 推荐策略</div>
    <div class="recommend-meta" id="recommendMeta"></div>
  </div>
  <div class="recommend-cards" id="recommendCards">
    <div class="recommend-loading">正在计算推荐策略...</div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <input class="search-input" id="searchInput" placeholder="🔍 搜索玩法名称..." />
  <select class="filter-select" id="difficultyFilter">
    <option value="">全部难度</option>
    <option value="K7">K7</option>
    <option value="K7-1">K7-1</option>
    <option value="K7-2">K7-2</option>
    <option value="K8-0">K8-0</option>
    <option value="K8-1">K8-1</option>
    <option value="K8-2">K8-2</option>
    <option value="幽邃">幽邃</option>
    <option value="深空">深空</option>
    <option value="红深空">红深空</option>
    <option value="九红深空">九红深空</option>
  </select>
  <select class="filter-select" id="tagFilter">
    <option value="">全部标签</option>
    <option value="众神">众神</option>
    <option value="劫车">劫车</option>
    <option value="叠界">叠界</option>
    <option value="塔罗">塔罗</option>
    <option value="多多">多多</option>
    <option value="大亨">大亨</option>
    <option value="巨力">巨力</option>
    <option value="无宠">无宠</option>
    <option value="机械">机械</option>
    <option value="梦魇">梦魇</option>
    <option value="渴瘾">渴瘾</option>
    <option value="狩猎">狩猎</option>
    <option value="玩偶">玩偶</option>
    <option value="画画">画画</option>
    <option value="空空">空空</option>

<div class="modal-overlay" id="strategyModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">--</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter">
      <button class="btn btn-danger" id="deleteBtn" onclick="doDeleteStrategy()">🗑️ 删除策略</button>
      <button class="btn btn-primary" id="saveQtyBtn" onclick="doSaveStrategyQty()">💾 保存修改</button>
      <button class="btn btn-ghost" onclick="closeModal()">关闭</button>
    </div>
  </div>

<script>
// ========== STATE ==========
var STATE = {
  allStrategies: [],
  firePrice: 0,
  filter: { keyword: "", difficulty: "", tag: "" },
  sort: { field: "name", asc: true },
  currentStrategyId: null,
};

// ========== INIT ==========
window.onerror = function(msg, url, line, col, e) {
  console.error("JS ERROR:", msg, "at line", line, "col", col);
  alert("JS错误: " + msg + " (行" + line + ")");
  return false;
};
document.addEventListener("DOMContentLoaded", function () {
  loadStrategies();
  loadRecommendations();
  // 每5分钟刷新一次推荐
  setInterval(loadRecommendations, 5 * 60 * 1000);
  document.getElementById("searchInput").addEventListener("input", onFilter);
  document.getElementById("difficultyFilter").addEventListener("change", onFilter);
  document.getElementById("tagFilter").addEventListener("change", onFilter);
  // 列头排序
  document.querySelectorAll("th[data-sort]").forEach(function (th) {
    th.addEventListener("click", function () {
      var field = th.dataset.sort;
      if (STATE.sort.field === field) {
        STATE.sort.asc = !STATE.sort.asc;
      } else {
        STATE.sort.field = field;
        STATE.sort.asc = true;
      }
      // 更新视觉
      document.querySelectorAll("th[data-sort]").forEach(function (h) {
        h.classList.remove("sorted");
        h.querySelector(".sort-icon").textContent = "▲";
      });
      th.classList.add("sorted");
      th.querySelector(".sort-icon").textContent = STATE.sort.asc ? "▲" : "▼";
      renderStrategies();
    });
  });
  // 点击弹窗背景关闭
  document.getElementById("strategyModal").addEventListener("click", function (e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeModal();
  });
});

// ========== LOAD ==========
// ========== RECOMMENDATIONS ==========
function loadRecommendations() {
  var container = document.getElementById("recommendCards");
  var meta = document.getElementById("recommendMeta");
  fetch("/api/strategy/top?n=3")
    .then(function(r){ return r.json(); })
    .then(function(d){
      var recs = d.recommendations || [];
      var fp = d.fire_price || 0;
      meta.textContent = fp > 0 ? "火价 " + fp + " 元/万火 · 每5分钟自动刷新" : "";
      if (recs.length === 0) {
        container.innerHTML = '<div class="recommend-loading">暂无策略数据，请先添加策略</div>';
        return;
      }
      container.innerHTML = recs.map(function(item, i){
        var s = item.strategy;
        var roi = item.roi;
        var profit = item.profit;
        var roiClass = roi >= 0 ? "roi" : "neg";
        var profitClass = profit >= 0 ? "roi" : "neg";
        var roiSign = roi >= 0 ? "+" : "";
        var profitSign = profit >= 0 ? "+" : "";
        var rank = ["🥇","🥈","🥉"][i] || "";
        return '<div class="recommend-card" onclick="openModal(' + s.id + ')">' +
          '<div class="rc-rank">' + (i+1) + '</div>' +
          '<div class="rc-name">' + rank + " " + escHtml(s.name || "---") + '</div>' +
          '<div class="rc-map">' + escHtml(s.map || "--") + '</div>' +
          '<div class="rc-stats">' +
            '<div class="rc-stat"><div class="l">投入产出</div><div class="v ' + roiClass + '">' + roiSign + roi.toFixed(1) + '%</div></div>' +
            '<div class="rc-stat"><div class="l">收益估算</div><div class="v ' + profitClass + '">' + profitSign + profit.toFixed(2) + '🔥</div></div>' +
            '<div class="rc-stat"><div class="l">成本</div><div class="v" style="color:var(--fire)">' + (item.cost > 0 ? item.cost.toFixed(2) + '🔥' : "--") + '</div></div>' +
          '</div>' +
          '<div class="rc-footer">' +
            '<span class="rc-duration">⏱ ' + escHtml(s.avg_duration || "--") + '</span>' +
            '<span class="diff-badge ' + escHtml(s.difficulty) + '">' + escHtml(s.difficulty || "--") + '</span>' +
          '</div>' +
        '</div>';
      }).join("");
    })
    .catch(function(){
      container.innerHTML = '<div class="recommend-loading">推荐加载失败</div>';
    });
}

// ========== LOAD ==========

function loadStrategies() {
  fetch("/api/strategies")
    .then(function (r) { return r.json(); })
    .then(function (d) {
      STATE.firePrice = d.fire_price || 0;
      STATE.allStrategies = d.strategies || [];

      renderStrategies();
    })
    .catch(function (e) {
      console.error("loadStrategies error:", e);
      document.getElementById("tableBody").innerHTML =
        '<tr><td colspan="10" class="empty-state">加载失败: ' + (e.message || "未知错误") + '</td></tr>';
    });
}

// ========== FILTER ==========
function onFilter() {
  STATE.filter.keyword = document.getElementById("searchInput").value.trim().toLowerCase();
  STATE.filter.difficulty = document.getElementById("difficultyFilter").value;
  STATE.filter.tag = document.getElementById("tagFilter").value;
  renderStrategies();
}

function getFiltered() {
  return STATE.allStrategies.filter(function (s) {
    var matchKw = !STATE.filter.keyword ||
      s.name.toLowerCase().includes(STATE.filter.keyword) ||
      (s.map || "").toLowerCase().includes(STATE.filter.keyword);
    var matchDiff = !STATE.filter.difficulty || s.difficulty === STATE.filter.difficulty;
    var matchTag = !STATE.filter.tag || (s.tags && s.tags.includes(STATE.filter.tag));
    return matchKw && matchDiff && matchTag;
  });
}

// ========== SORT ==========
function getSorted(list) {
  var field = STATE.sort.field;
  var asc = STATE.sort.asc;
  return list.slice().sort(function (a, b) {
    var va = a[field];
    var vb = b[field];
    if (va == null) va = "";
    if (vb == null) vb = "";
    if (typeof va === "string") {
      return asc ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return asc ? va - vb : vb - va;
  });
}

// ========== RENDER ==========
function renderStrategies() {
  var list = getSorted(getFiltered());
  var tbody = document.getElementById("tableBody");
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty-state">没有符合条件的玩法策略</td></tr>';
    return;
  }
  var fp = STATE.firePrice;
  tbody.innerHTML = list.map(function (s) { return renderRow(s, fp); }).join("");
}

function renderRow(s, fp) {
  // 收益估算 = 掉落总价值 - 成本
  var dropValue = (s.enriched_core_drops || []).reduce(function (sum, d) {
    return sum + ((d.price || 0) * (d.count || 1));
  }, 0);
  var profit = dropValue - (s.total_cost_fire || 0);
  var roi = s.total_cost_fire > 0 ? ((dropValue / s.total_cost_fire - 1) * 100) : 0;

  // 成本显示
  var costFire = s.total_cost_fire > 0
    ? '<span class="td-fire">' + s.total_cost_fire.toFixed(2) + '</span>'
    : '<span style="color:var(--muted)">--</span>';


  // 收益显示
  var profitClass = profit > 0 ? "positive" : profit < 0 ? "negative" : "zero";
  var profitDisplay = fp > 0 && s.total_cost_fire > 0
    ? '<span class="td-fire">' + profit.toFixed(2) + '</span>'
    : '<span style="color:var(--muted)">--</span>';
  var roiDisplay = roi !== 0 && fp > 0
    ? '<span class="td-roi">' + (roi >= 0 ? "+" : "") + roi.toFixed(1) + '%</span>'
    : '<span style="color:var(--muted)">--</span>';
  var perHour = fp > 0 && s.total_cost_fire > 0 && s.avg_duration
    ? (profit - (s.total_cost_fire || 0)) * (60 / parseDurationToMinutes(s.avg_duration))
    : null;
  var perHourDisplay = perHour !== null
    ? '<span class="td-fire">' + perHour.toFixed(2) + '</span>'
    : '<span style="color:var(--muted)">--</span>';


  // 解析时长字符串为分钟数
  function parseDurationToMinutes(dur) {
    if (!dur) return 0;
    var hours = 0, mins = 0, secs = 0;
    var h = dur.match(/(\d+(?:\.\d+)?)\s*h|小时/);
    var m = dur.match(/(\d+)\s*m|分/);
    var s = dur.match(/(\d+)\s*s|秒/);
    if (h) hours = parseFloat(h[1]);
    if (m) mins = parseInt(m[1]);
    if (s) secs = parseInt(s[1]);
    var totalMins = hours * 60 + mins + secs / 60;
    return totalMins > 0 ? totalMins : 1; // 默认1分钟防除零
  }

  // 核心掉落
  var dropsAll = (s.enriched_core_drops || []);
  var drops = dropsAll.slice(0,5).map(function(d){return '<span class="drop-item"><span class="dn">'+escHtml(d.name)+'</span></span>'}).join("");
  if(dropsAll.length>5)drops+='<span class="drop-item" style="color:var(--muted)">+'+(dropsAll.length-5)+'</span>';

  // 标签
  var tags = (s.tags || []).map(function (t) {
    return '<span class="tag">' + escHtml(t) + '</span>';
  }).join("");

  return '<tr onclick="openModal(' + s.id + ')">' +
    '<td><div class="td-name" title="' + escHtml(s.name) + '">' + escHtml(s.name) + '</div></td>' +
    '<td><div class="td-map" title="' + escHtml(s.map) + '">' + escHtml(s.map) + '</div></td>' +
    '<td>' + costFire + '</td>' +
    '<td><div class="td-drops">' + (drops || '<span style="color:var(--muted)">--</span>') + '</div></td>' +
    '<td><span class="td-duration">' + escHtml(s.avg_duration) + '</span></td>' +
    '<td><span class="diff-badge ' + escHtml(s.difficulty) + '">' + escHtml(s.difficulty) + '</span></td>' +
    '<td>' + (tags || '--') + '</td>' +
    '<td>' + profitDisplay + '</td>' +
    '<td>' + perHourDisplay + '</td>' +
    '<td>' + roiDisplay + '</td>' +
  '</tr>';
}

// ========== MODAL ==========
function openModal(id) {
  var s = STATE.allStrategies.find(function (x) { return x.id === id; });
  if (!s) return;
  STATE.currentStrategyId = id;

  var fp = STATE.firePrice;
  var dropValue = (s.enriched_core_drops || []).reduce(function (sum, d) { return sum + ((d.price || 0) * (d.count || 1)); }, 0);
  var profit = dropValue - (s.total_cost_fire || 0);
  var roi = s.total_cost_fire > 0 ? ((dropValue / s.total_cost_fire - 1) * 100) : 0;

  var costRows = (s.enriched_cost_items || []).map(function (item, idx) {
    return '<tr class="cost-row" data-idx="' + idx + '">' +
      '<td><input type="text" class="cost-name-input" data-type="cost" data-idx="' + idx + '" value="' + escHtml(item.name) + '" placeholder="输入物品名" onblur="onCostNameBlur(this)" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 6px;font-size:12px" /></td>' +
      '<td style="color:var(--fire)" class="cost-price" data-price="' + (item.price || 0) + '">' + (item.price_display || "--") + '</td>' +
      '<td><input type="number" class="cnt-input cost-cnt-input" data-type="cost" data-idx="' + idx + '" value="' + item.count + '" min="0" oninput="recalcModalTotals()" style="width:60px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:3px 6px;font-size:12px;text-align:center" /></td>' +
      '<td style="color:var(--fire)" class="cost-total">' + (item.total_cost > 0 ? item.total_cost.toFixed(2) : "--") + '</td>' +
      '<td><button onclick="delModalRow(this)" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px" title="删除">✕</button></td>' +
    '</tr>';
  }).join("");
  costRows += '<tr><td colspan="5" style="padding:4px;text-align:left"><button onclick="addCostRow()" style="background:var(--surface2);border:1px dashed var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:4px 12px;font-size:12px">+ 添加成本物品</button></td></tr>';

  var dropRows = (s.enriched_core_drops || []).map(function (item, idx) {
    return '<tr class="drop-row" data-idx="' + idx + '">' +
      '<td><input type="text" class="drop-name-input" data-type="drop" data-idx="' + idx + '" value="' + escHtml(item.name) + '" placeholder="输入物品名" onblur="onDropNameBlur(this)" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 6px;font-size:12px" /></td>' +
      '<td style="color:var(--fire)" class="drop-price" data-price="' + (item.price || 0) + '">' + (item.price_display || "--") + '</td>' +
      '<td><input type="number" class="cnt-input drop-cnt-input" data-type="drop" data-idx="' + idx + '" value="' + item.count + '" min="0" data-price="' + (item.price || 0) + '" oninput="recalcModalTotals()" style="width:60px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:3px 6px;font-size:12px;text-align:center" /></td>' +
      '<td style="color:var(--fire)" class="drop-total">' + ((item.price || 0) * item.count).toFixed(2) + '</td>' +
      '<td><button onclick="delModalRow(this)" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px" title="删除">✕</button></td>' +
    '</tr>';
  }).join("");
  dropRows += '<tr><td colspan="5" style="padding:4px;text-align:left"><button onclick="addDropRow()" style="background:var(--surface2);border:1px dashed var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:4px 12px;font-size:12px">+ 添加核心掉落</button></td></tr>';

  document.getElementById("modalTitle").textContent = s.name;
  document.getElementById("modalBody").innerHTML =
    '<div class="modal-meta">' +
      '<div class="modal-meta-item"><div class="label">地图区域</div><div class="value">📍 ' + escHtml(s.map) + '</div></div>' +
      '<div class="modal-meta-item"><div class="label">平均时长</div><div class="value">⏱ ' + escHtml(s.avg_duration) + '</div></div>' +
      '<div class="modal-meta-item"><div class="label">难度</div><div class="value"><span class="diff-badge ' + escHtml(s.difficulty) + '">' + escHtml(s.difficulty) + '</span></div></div>' +
      '<div class="modal-meta-item"><div class="label">成本合计</div><div class="value" style="color:var(--fire)" id="mCostTotal">' + (s.total_cost_fire > 0 ? s.total_cost_fire.toFixed(2) + " 🔥" : "--") + '</div></div>' +
      '<div class="modal-meta-item"><div class="label">掉落价值</div><div class="value" style="color:var(--fire)" id="mDropValue">' + dropValue.toFixed(2) + ' 🔥</div></div>' +
      '<div class="modal-meta-item"><div class="label">收益估算</div><div class="value" style="color:' + (profit >= 0 ? "var(--green)" : "var(--danger)") + '">' + (profit >= 0 ? "+" : "") + profit.toFixed(2) + ' 🔥</div></div>' +
      '<div class="modal-meta-item"><div class="label">投入产出比</div><div class="value" style="color:' + (roi >= 0 ? "var(--green)" : "var(--danger)") + '">' + (roi >= 0 ? "+" : "") + roi.toFixed(1) + '%</div></div>' +
    '</div>' +

    (costRows ? (
      '<div><div class="modal-section-title">💰 成本物品</div>' +
      '<table class="modal-item-table" id="modalCostTable"><thead><tr><th>物品</th><th>单价</th><th>数量</th><th>小计</th></tr></thead><tbody id="modalCostRows">' + costRows + '</tbody></table></div>'
    ) : "") +

    (dropRows ? (
      '<div><div class="modal-section-title">🎁 核心掉落</div>' +
      ((s.drop_categories && s.drop_categories.length > 0) ?
        '<div class="drop-cat-bar" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;padding:8px;background:var(--surface2);border-radius:8px">' +
          s.drop_categories.map(function(c){
            return '<span style="background:var(--surface);padding:3px 10px;border-radius:20px;font-size:12px;color:var(--text);border:1px solid var(--border)">' + escHtml(c.name) + ' <span style="color:var(--fire)">' + c.percent + '%</span></span>';
          }).join("") +
        '</div>' : ""
      ) +
      '<table class="modal-item-table" id="modalDropTable"><thead><tr><th>物品</th><th>火价</th><th>数量</th></tr></thead><tbody id="modalDropRows">' + dropRows + '</tbody></table></div>'
    ) : "") +

    (s.notes ? '<div class="modal-notes">' + escHtml(s.notes) + '</div>' : "") +

    '<div style="font-size:11px;color:var(--muted);text-align:right;padding-top:4px">当前火价: ' + (fp > 0 ? fp.toFixed(2) + " 元/万火" : "--") + ' · 点击列头可排序</div>'
  ;

  document.getElementById("strategyModal").classList.add("open");
}

function closeModal() {
  document.getElementById("strategyModal").classList.remove("open");
  STATE.currentStrategyId = null;
}

function doDeleteStrategy() {
  var id = STATE.currentStrategyId;
  if (!id) return;
  if (!confirm("确定要删除这条策略吗？删除后不可恢复。")) return;
  fetch("/api/strategy/" + id, { method: "DELETE" })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) {
        closeModal();
        loadStrategies();
      } else {
        alert("删除失败: " + (d.message || "未知错误"));
      }
    })
    .catch(function(e) {
      alert("网络错误: " + e.message);
    });
}

function doSaveStrategyQty() {
  var id = STATE.currentStrategyId;
  if (!id) return;

  // 读取成本物品（跳过最后一行按钮行）
  var costItems = [];
  document.querySelectorAll("#modalCostRows tr.cost-row").forEach(function(tr) {
    var nameInput = tr.querySelector(".cost-name-input");
    var cntInput = tr.querySelector(".cost-cnt-input");
    if (!nameInput || !cntInput) return;
    var name = nameInput.value.trim();
    if (!name) return;
    costItems.push({
      name: name,
      count: parseInt(cntInput.value) || 0
    });
  });

  // 读取核心掉落
  var dropItems = [];
  document.querySelectorAll("#modalDropRows tr.drop-row").forEach(function(tr) {
    var nameInput = tr.querySelector(".drop-name-input");
    var cntInput = tr.querySelector(".drop-cnt-input");
    if (!nameInput || !cntInput) return;
    var name = nameInput.value.trim();
    if (!name) return;
    dropItems.push({
      name: name,
      count: parseInt(cntInput.value) || 0
    });
  });

  var payload = { cost_items: costItems, core_drops: dropItems };
  document.getElementById("saveQtyBtn").disabled = true;
  fetch("/api/strategy/" + id, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (d.success) {
        var idx = STATE.allStrategies.findIndex(function(s){ return s.id === id; });
        if (idx >= 0) STATE.allStrategies[idx] = d.strategy;
        closeModal();
        loadRecommendations();
        renderStrategies();
      } else {
        alert("保存失败: " + (d.message || "未知错误"));
      }
      document.getElementById("saveQtyBtn").disabled = false;
    })
    .catch(function(e) {
      alert("网络错误: " + e.message);
      document.getElementById("saveQtyBtn").disabled = false;
    });
}

// ========== MODAL ROW HELPERS ==========
function onCostNameBlur(inp) {
  var name = inp.value.trim();
  if (!name) return;
  fetch("/api/item/search?q=" + encodeURIComponent(name))
    .then(function(r){ return r.json(); })
    .then(function(items){
      var priceCell = inp.closest("tr").querySelector(".cost-price");
      if (items && items.length > 0) {
        priceCell.textContent = items[0].price_display || "--";
        priceCell.dataset.price = items[0].price || 0;
        // Update total
        var cnt = parseFloat(inp.closest("tr").querySelector(".cost-cnt-input").value) || 0;
        var totalCell = inp.closest("tr").querySelector(".cost-total");
        totalCell.textContent = ((items[0].price || 0) * cnt).toFixed(2);
      } else {
        priceCell.textContent = "--";
        priceCell.dataset.price = 0;
        var totalCell = inp.closest("tr").querySelector(".cost-total");
        totalCell.textContent = "--";
      }
    });
}

function onDropNameBlur(inp) {
  var name = inp.value.trim();
  if (!name) return;
  fetch("/api/item/search?q=" + encodeURIComponent(name))
    .then(function(r){ return r.json(); })
    .then(function(items){
      var priceCell = inp.closest("tr").querySelector(".drop-price");
      if (items && items.length > 0) {
        priceCell.textContent = items[0].price_display || "--";
        priceCell.dataset.price = items[0].price || 0;
      } else {
        priceCell.textContent = "--";
        priceCell.dataset.price = 0;
      }
    });
}

function addCostRow() {
  var tbody = document.getElementById("modalCostRows");
  var row = document.createElement("tr");
  row.className = "cost-row";
  row.innerHTML = '<td><input type="text" class="cost-name-input" data-type="cost" value="" placeholder="输入物品名" onblur="onCostNameBlur(this)" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 6px;font-size:12px" /></td>' +
    '<td style="color:var(--fire)" class="cost-price">--</td>' +
    '<td><input type="number" class="cnt-input cost-cnt-input" data-type="cost" value="1" min="0" data-price="0" oninput="recalcModalTotals()" style="width:60px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:3px 6px;font-size:12px;text-align:center" /></td>' +
    '<td style="color:var(--fire)" class="cost-total">--</td>' +
    '<td><button onclick="delModalRow(this)" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px" title="删除">✕</button></td>';
  tbody.insertBefore(row, tbody.lastElementChild);
}

function addDropRow() {
  var tbody = document.getElementById("modalDropRows");
  var row = document.createElement("tr");
  row.className = "drop-row";
  row.innerHTML = '<td><input type="text" class="drop-name-input" data-type="drop" value="" placeholder="输入物品名" onblur="onDropNameBlur(this)" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 6px;font-size:12px" /></td>' +
    '<td style="color:var(--fire)" class="drop-price">--</td>' +
    '<td><input type="number" class="cnt-input drop-cnt-input" data-type="drop" value="1" min="0" data-price="0" oninput="recalcModalTotals()" style="width:60px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:3px 6px;font-size:12px;text-align:center" /></td>' +
    '<td style="color:var(--fire)" class="drop-total">--</td>' +
    '<td><button onclick="delModalRow(this)" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px" title="删除">✕</button></td>';
  tbody.insertBefore(row, tbody.lastElementChild);
}

function delModalRow(btn) {
  var tr = btn.closest("tr");
  tr.parentNode.removeChild(tr);
}

function recalcModalTotals() {
  // Recalc cost subtotals + total
  var costTotal = 0;
  document.querySelectorAll(".cost-row").forEach(function(tr) {
    var price = parseFloat(tr.querySelector(".cost-cnt-input").dataset.price) || 0;
    var cnt = parseFloat(tr.querySelector(".cost-cnt-input").value) || 0;
    var sub = price * cnt;
    costTotal += sub;
    var tc = tr.querySelector(".cost-total");
    if (tc) tc.textContent = sub.toFixed(2);
  });
  var mct = document.getElementById("mCostTotal");
  if (mct) mct.textContent = costTotal > 0 ? costTotal.toFixed(2) + " 🔥" : "--";

  // Recalc drop subtotals + value
  var dropTotal = 0;
  document.querySelectorAll(".drop-row").forEach(function(tr) {
    var price = parseFloat(tr.querySelector(".drop-cnt-input").dataset.price) || 0;
    var cnt = parseFloat(tr.querySelector(".drop-cnt-input").value) || 0;
    var sub = price * cnt;
    dropTotal += sub;
    var tc = tr.querySelector(".drop-total");
    if (tc) tc.textContent = sub > 0 ? sub.toFixed(2) : "--";
  });
  var mdv = document.getElementById("mDropValue");
  if (mdv) mdv.textContent = dropTotal.toFixed(2) + " 🔥";
}

// ========== UTIL ==========
function escHtml(str) {
  if (str == null) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ========== UPLOAD MODAL ==========
var _uploadFile = null;
var _lastParsed = null; // 存储最近一次 OCR 解析结果

function openUploadModal() {
  _uploadFile = null;
  _lastParsed = null;
  document.getElementById("uploadModal").classList.add("open");
  document.getElementById("previewSection").classList.remove("show");
  document.getElementById("uploadZone").style.display = "block";
  document.getElementById("fileInput").value = "";
  document.getElementById("uploadStatus").className = "upload-status";
  document.getElementById("uploadStatus").textContent = "";
  document.getElementById("parseBtn").disabled = true;
  document.getElementById("addBtn").disabled = true;
  // 重置可编辑字段
  ["pv-name","pv-map","pv-duration","pv-tags"].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = "";
  });
  var diffEl = document.getElementById("pv-difficulty");
  if (diffEl) diffEl.value = "";
  document.getElementById("pv-cost").textContent = "--";
  document.getElementById("pv-drops").textContent = "--";
}

function closeUploadModal() {
  document.getElementById("uploadModal").classList.remove("open");
}

function onFileSelected(input) {
  var file = input.files[0];
  if (!file) return;
  _uploadFile = file;
  // 显示预览区
  document.getElementById("uploadZone").style.display = "none";
  document.getElementById("previewSection").classList.add("show");
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById("previewImg");
    if (!img) {
      img = document.createElement("img");
      img.id = "previewImg";
      img.className = "preview-img";
      document.getElementById("previewSection").insertBefore(img, document.getElementById("previewTable"));
    }
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  document.getElementById("parseBtn").disabled = false;
  document.getElementById("addBtn").disabled = false;
  document.getElementById("uploadStatus").className = "upload-status";
  document.getElementById("uploadStatus").textContent = "";
}

function setStatus(msg, type) {
  var el = document.getElementById("uploadStatus");
  el.textContent = msg;
  el.className = "upload-status show " + type;
}

function fillPreview(parsed) {
  _lastParsed = parsed; // 保存供提交时使用
  document.getElementById("pv-name").value = parsed.name || "";
  document.getElementById("pv-map").value = parsed.map || "";
  document.getElementById("pv-duration").value = parsed.avg_duration || "";
  document.getElementById("pv-tags").value = (parsed.tags || []).join(", ") || "";
  // 难度 select
  var diffEl = document.getElementById("pv-difficulty");
  var diffVal = parsed.difficulty || "";
  var matched = false;
  for (var i = 0; i < diffEl.options.length; i++) {
    if (diffEl.options[i].value === diffVal) {
      diffEl.value = diffVal;
      matched = true;
      break;
    }
  }
  if (!matched) diffEl.value = "";
  // 显示时将数量除以使用次数，转换为单次数量（但原始 _lastParsed 保持不变，供提交时使用）
  var useCount = parsed.use_count || 1;
  var costStr = (parsed.cost_items || []).map(function(c){
    return c.name + " ×" + c.count;
  }).join(", ");
  document.getElementById("pv-cost").textContent = costStr || "--";
  var dropStr = (parsed.core_drops || []).map(function(d){
    var cnt = useCount > 1 ? (d.count / useCount).toFixed(2) : d.count;
    return d.name + "(" + d.rarity + ") ×" + cnt;
  }).join(", ");
  document.getElementById("pv-drops").textContent = dropStr || "--";
}

function doParseOnly() {
  if (!_uploadFile) return;
  setStatus("🔍 正在解析截图，请稍候...", "loading");
  var formData = new FormData();
  formData.append("image", _uploadFile);
  fetch("/api/strategy/parse-only", { method: "POST", body: formData })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success) {
        fillPreview(d.parsed);
        setStatus("✅ 解析成功，点击\"直接添加\"入库", "success");
      } else {
        setStatus("❌ " + (d.message || "解析失败"), "error");
      }
    })
    .catch(function(e){
      setStatus("❌ 网络错误: " + e.message, "error");
    });
}

function doUploadAndAdd() {
  if (!_uploadFile || !_lastParsed) {
    // 兜底：没有文件时尝试用当前输入的值
    var payload = {
      name: document.getElementById("pv-name").value || "未命名",
      map: document.getElementById("pv-map").value || "",
      avg_duration: document.getElementById("pv-duration").value || "",
      difficulty: document.getElementById("pv-difficulty").value || "",
      tags: document.getElementById("pv-tags").value.split(",").map(function(t){ return t.trim(); }).filter(Boolean),
      cost_items: (_lastParsed && _lastParsed.cost_items) || [],
      core_drops: (_lastParsed && _lastParsed.core_drops) || [],
      use_count: (_lastParsed && _lastParsed.use_count) || 1,
    };
    submitStrategyPayload(payload);
    return;
  }
  // 从界面收集用户编辑后的值
  var payload = {
    name: document.getElementById("pv-name").value || _lastParsed.name || "未命名",
    map: document.getElementById("pv-map").value || _lastParsed.map || "",
    avg_duration: document.getElementById("pv-duration").value || _lastParsed.avg_duration || "",
    difficulty: document.getElementById("pv-difficulty").value || _lastParsed.difficulty || "",
    tags: document.getElementById("pv-tags").value
      ? document.getElementById("pv-tags").value.split(",").map(function(t){ return t.trim(); }).filter(Boolean)
      : (_lastParsed.tags || []),
    cost_items: _lastParsed.cost_items || [],
    core_drops: _lastParsed.core_drops || [],
    use_count: _lastParsed.use_count || 1,
  };
  submitStrategyPayload(payload);
}

function submitStrategyPayload(payload) {
  setStatus("⏳ 正在添加策略...", "loading");
  document.getElementById("addBtn").disabled = true;
  document.getElementById("parseBtn").disabled = true;
  fetch("/api/strategy/add", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success) {
        setStatus("✅ " + d.message, "success");
        loadStrategies();
        setTimeout(function(){
          closeUploadModal();
          document.getElementById("addBtn").disabled = false;
          document.getElementById("parseBtn").disabled = false;
        }, 1500);
      } else {
        setStatus("❌ " + (d.message || "添加失败"), "error");
        document.getElementById("addBtn").disabled = false;
        document.getElementById("parseBtn").disabled = false;
      }
    })
    .catch(function(e){
      setStatus("❌ 网络错误: " + e.message, "error");
      document.getElementById("addBtn").disabled = false;
      document.getElementById("parseBtn").disabled = false;
    });
}

// 拖拽上传
(function(){
  var zone = document.getElementById("uploadZone");
  if (!zone) return;
  zone.addEventListener("dragover", function(e){
    e.preventDefault();
    zone.classList.add("dragover");
  });
  zone.addEventListener("dragleave", function(){
    zone.classList.remove("dragover");
  });
  zone.addEventListener("drop", function(e){
    e.preventDefault();
    zone.classList.remove("dragover");
    var file = e.dataTransfer.files[0];
    if (file && file.type.startsWith("image/")) {
      document.getElementById("fileInput").files = e.dataTransfer.files;
      onFileSelected(document.getElementById("fileInput"));
    }
  });
})();

function openSettingsModal(){
  document.getElementById("settingsModal").classList.add("open");
  fetch("/api/settings").then(r=>r.json()).then(data=>{
    document.getElementById("settingsDbPath").value=data.tl_item_monitor_db||"";
    document.getElementById("siPath").textContent=data.tl_item_monitor_db||"-";
    document.getElementById("siCount").textContent=data.db_item_count>0?data.db_item_count+" 条物品":"-";
    document.getElementById("siFire").textContent=data.db_fire_price>0?data.db_fire_price.toFixed(2)+" 元/万火":"-";
    var st=document.getElementById("siStatus");
    var badge=document.getElementById("connBadge");
    if(data.db_exists){st.textContent="✅ 已连接";st.className="si-value ok";badge.style.display="inline-block"}
    else{st.textContent="❌ 未连接";st.className="si-value err";badge.style.display="none"}
  });
}
function closeSettingsModal(){document.getElementById("settingsModal").classList.remove("open")}
function saveSettings(){
  var path=document.getElementById("settingsDbPath").value.trim();
  if(!path){alert("路径不能为空");return}
  fetch("/api/settings",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({tl_item_monitor_db:path})})
  .then(r=>r.json()).then(data=>{
    if(data.success){closeSettingsModal();showToast("设置已保存，正在刷新...");setTimeout(function(){loadStrategies()},800)}
    else{alert("保存失败: "+(data.message||"未知错误"))}
  });
}
